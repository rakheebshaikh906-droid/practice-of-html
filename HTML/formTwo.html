<body>
    <H2>MORE FORM INPUTS</H2>
    <form action="" method="get" class="form example">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
        <br><br>
        <input type="submit" value="Submit">
        <br><br>
        <input type="checkbox" name="check box" id="check box">
        <br><br>
        <input type="password" placeholder="enter the password" name="password" id="password">
        <br><br>
        <input type="email" placeholder="enter the email" name="email" id="email">
        <br><br>
        <input type="month" placeholder="select a month" name="month" id="month">
        <br><br>
        <select name="select" id="select">
            <option value="option1">Option 1</option>
            <option value="option2">Option 2</option>
            <option value="option3">Option 3</option>
        </select>
        <br><br>
        <select name="select2" id="select2">
            <option value="option1">Option 1</option>
            <option value="option2">Option 2</option>
            <option value="option3">Option 3</option>
        </select>
    </form>
